secret:
  name: b2-iron-config

bucket:
  name: iron-config
  provider: generic
  interval: 1m
  bucketName: ""
  endpoint: ""
  region: ""
  prefix: clusters/iron/
  timeout: 60s

kustomization:
  name: iron
  interval: 5m
  retryInterval: 1m
  timeout: 5m
  path: ./clusters/iron
  prune: true
  wait: true
