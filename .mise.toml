[tools]
terraform = "1.14.3"
fnox = "1.26.0"
aws-cli = "2.35.11"
flux2 = "2.8.8"
github-cli = "2.94.0"
kubectl = "1.36.2"

[tasks."b2:secrets:check"]
description = "Check the B2 Terraform secrets can be read through fnox"
run = "fnox check --profile b2 --no-defaults"

[tasks."b2:tf:fmt"]
description = "Format the B2 Terraform files"
run = "terraform -chdir=infra/b2 fmt"

[tasks."b2:tf:init"]
description = "Initialize the B2 Terraform Cloud state and providers"
run = "fnox exec --profile b2 --no-defaults -- terraform -chdir=infra/b2 init"

[tasks."b2:tf:validate"]
description = "Validate the B2 Terraform configuration"
run = "fnox exec --profile b2 --no-defaults -- terraform -chdir=infra/b2 validate"

[tasks."b2:tf:plan"]
description = "Plan B2 bucket, application keys, GitHub secrets, and Flux outputs"
run = "fnox exec --profile b2 --no-defaults -- terraform -chdir=infra/b2 plan -out=tfplan"

[tasks."b2:tf:apply"]
description = "Apply B2 bucket, application keys, GitHub secrets, and Flux outputs"
run = "fnox exec --profile b2 --no-defaults -- terraform -chdir=infra/b2 apply"

[tasks."civo:secrets:check"]
description = "Check the Civo Terraform secrets can be read through fnox"
run = "fnox check --profile civo --no-defaults"

[tasks."civo:tf:fmt"]
description = "Format the Civo Terraform files"
run = "terraform -chdir=infra/civo fmt"

[tasks."civo:tf:init"]
description = "Initialize the Civo Terraform Cloud state and providers"
run = "fnox exec --profile civo --no-defaults -- terraform -chdir=infra/civo init"

[tasks."civo:tf:validate"]
description = "Validate the Civo Kubernetes Terraform configuration"
run = "fnox exec --profile civo --no-defaults -- terraform -chdir=infra/civo validate"

[tasks."civo:tf:plan"]
description = "Plan the Civo Kubernetes cluster"
run = "fnox exec --profile civo --no-defaults -- terraform -chdir=infra/civo plan -out=tfplan"

[tasks."civo:tf:apply"]
description = "Apply the Civo Kubernetes cluster"
run = "fnox exec --profile civo --no-defaults -- terraform -chdir=infra/civo apply"

[tasks."flux-bootstrap:secrets:check"]
description = "Check the Flux bootstrap Terraform secrets can be read through fnox"
run = "fnox check --profile flux-bootstrap --no-defaults"

[tasks."flux-bootstrap:tf:fmt"]
description = "Format the Flux bootstrap Terraform files"
run = "terraform -chdir=infra/flux-bootstrap fmt"

[tasks."flux-bootstrap:tf:init"]
description = "Initialize the Flux bootstrap Terraform Cloud state and providers"
run = "fnox exec --profile flux-bootstrap --no-defaults -- terraform -chdir=infra/flux-bootstrap init"

[tasks."flux-bootstrap:tf:validate"]
description = "Validate the Flux bootstrap Terraform configuration"
run = "fnox exec --profile flux-bootstrap --no-defaults -- terraform -chdir=infra/flux-bootstrap validate"

[tasks."flux-bootstrap:tf:plan"]
description = "Plan Flux installation and B2 bootstrap resources"
run = "fnox exec --profile flux-bootstrap --no-defaults -- terraform -chdir=infra/flux-bootstrap plan -out=tfplan"

[tasks."flux-bootstrap:tf:apply"]
description = "Apply Flux installation and B2 bootstrap resources"
run = "fnox exec --profile flux-bootstrap --no-defaults -- terraform -chdir=infra/flux-bootstrap apply"
