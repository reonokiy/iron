apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 30m
  releaseName: external-secrets
  targetNamespace: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    installCRDs: true
    leaderElect: true
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
    webhook:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
    certController:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
    extraObjects:
      - apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: onepassword
        spec:
          provider:
            onepasswordSDK:
              vault: iron.nokiy.net
              auth:
                serviceAccountSecretRef:
                  name: onepassword-service-account-token
                  namespace: external-secrets
                  key: token
