apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets-crds
  namespace: flux-system
spec:
  interval: 30m
  releaseName: external-secrets-crds
  targetNamespace: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    installCRDs: true
    createOperator: false
    serviceAccount:
      create: false
    rbac:
      create: false
    webhook:
      create: false
    certController:
      create: false
