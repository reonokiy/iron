apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets-store
  namespace: flux-system
spec:
  interval: 30m
  releaseName: external-secrets-store
  targetNamespace: external-secrets
  dependsOn:
    - name: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    installCRDs: false
    createOperator: false
    serviceAccount:
      create: false
    rbac:
      create: false
    webhook:
      create: false
    certController:
      create: false
    extraObjects:
      - apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: onepassword
        spec:
          provider:
            onepasswordSDK:
              vault: iron.nokiy.net
              auth:
                serviceAccountSecretRef:
                  name: onepassword-service-account-token
                  namespace: external-secrets
                  key: token
